services:
  - type: web
    name: homecache-api
    env: node
    plan: free
    buildCommand: npm install && npm rebuild sqlite3 --build-from-source
    startCommand: npm run server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: APP_BASE_URL
        value: https://homecache-commons12-77de.vercel.app
      - key: DB_PATH
        value: ./server/data/homecache.db
      - key: UPLOADS_DIR
        value: ./server/uploads
