services:
  - type: web
    name: homecache-api
    env: node
    plan: free
    buildCommand: npm install --include=dev
    startCommand: npm run server
    healthCheckPath: /api/health
    disk:
      name: homecache-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: APP_BASE_URL
        value: https://homecache-commons12-77de.vercel.app
      - key: ALLOWED_ORIGINS
        value: https://homecache-commons12-77de.vercel.app
      - key: DB_PATH
        value: /var/data/homecache.db
      - key: UPLOADS_DIR
        value: /var/data/uploads
