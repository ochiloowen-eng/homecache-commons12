services:
  - type: web
    name: homecache-api
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm run server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: APP_BASE_URL
        value: https://homecache-commons12-77de.vercel.app
      - key: DB_PATH
        value: /var/data/homecache.db
      - key: UPLOADS_DIR
        value: /var/data/uploads
    disk:
      name: homecache-data
      mountPath: /var/data
      sizeGB: 2
